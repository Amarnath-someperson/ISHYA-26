<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ISHYA -26 FACULTY TICKETS</title>
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/global.css">
    <script src="/layout.js" defer></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --bg-deep: #060606; --bg-panel: #181C10; --gold: #D6C26A; --olive: #3D4324; --green: #4D8F48; --text-main: #e0e5e0; --font-head: 'Chakra Petch', sans-serif; --font-mono: 'JetBrains Mono', monospace; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-deep); color: var(--text-main); font-family: var(--font-head); overflow-x: hidden; }
        #bg-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: radial-gradient(circle at center, #11150e 0%, #060606 100%); }
        .scanline { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 9000; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%); background-size: 100% 4px; }
        #loader-wrapper { position: fixed; inset: 0; background: var(--bg-deep); z-index: 99999; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: opacity 0.3s ease; }
        .loading-text { color: var(--gold); font-family: var(--font-mono); animation: pulseText 1.5s infinite; letter-spacing: 2px; }
        .loader-bar { width: 200px; height: 4px; background: var(--olive); margin-top: 15px; position: relative; overflow: hidden; border-radius: 2px; }
        .loader-bar::after { content:''; position: absolute; top: 0; left: 0; width: 50%; height: 100%; background: var(--green); animation: loadAnim 1.2s infinite ease-in-out; border-radius: 2px; }
        @keyframes loadAnim { 0% { transform: translateX(-100%); } 100% { transform: translateX(200%); } }
        @keyframes pulseText { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        body.loaded #loader-wrapper { opacity: 0; visibility: hidden; }
        header { position: relative; width: 100%; z-index: 10; display: flex; align-items: center; justify-content: center; padding: 40px 20px 10px 20px; }
        .brand { font-size: 2.2rem; font-weight: 700; color: var(--gold); letter-spacing: 2px; text-transform: uppercase; text-align: center; line-height: 1; }
        .brand span { color: var(--green); font-size: 1rem; display: block; letter-spacing: 6px; margin-top: 5px; }
        .container { max-width: 900px; margin: 0 auto; padding: 20px; padding-bottom: 100px; }
        .proshow-section { background: repeating-linear-gradient(45deg, #181C10, #181C10 10px, #0e110a 10px, #0e110a 20px); border: 1px solid var(--gold); padding: 40px; margin-top: 20px; text-align: center; position: relative; clip-path: polygon(20px 0, 100% 0, 100% calc(100% - 20px), calc(100% - 20px) 100%, 0 100%, 0 20px); }
        .proshow-title { font-size: 2.5rem; color: #fff; text-shadow: 0 0 10px rgba(255,255,255,0.3); margin-bottom: 20px; text-transform: uppercase; font-weight: 900;}
        .proshow-banner { width: 100%; max-width: 700px; height: auto; display: block; margin-left: auto; margin-right: auto; border: 2px solid var(--olive); border-radius: 8px; margin-bottom: 30px; transition: 0.3s; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        .proshow-banner:hover { border-color: var(--gold); box-shadow: 0 0 30px rgba(214, 194, 106, 0.2); }
        .btn-large { font-family: var(--font-head); font-weight: 700; width: 100%; max-width: 350px; margin: 0 auto; display: block; background: var(--green); color: #000; border: none; padding: 18px; font-size: 1.3rem; cursor: pointer; clip-path: polygon(15px 0, 100% 0, 100% 100%, 0 100%, 0 15px); transition: 0.2s; text-transform: uppercase; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        .btn-large:hover { background: var(--gold); transform: translateY(-3px); }
        #proshow-modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(5px); z-index: 10010; display: none; flex-direction: column; overflow-y: auto; padding: 30px 15px; }
        .proshow-container { width: 100%; max-width: 600px; background: var(--bg-panel); margin: auto; border: 1px solid var(--gold); box-shadow: 0 0 40px rgba(214, 194, 106, 0.2); display: flex; flex-direction: column; }
        .modal-header { padding: 15px 20px; background: rgba(214, 194, 106, 0.1); border-bottom: 1px solid var(--gold); display: flex; justify-content: space-between; align-items: center; }
        .modal-title { color: var(--gold); font-size: 1.2rem; text-transform: uppercase; font-weight: bold;}
        .close-icon { cursor: pointer; font-size: 1.8rem; color: var(--gold); transition: 0.2s; line-height: 1;}
        .close-icon:hover { color: #fff; transform: scale(1.1); }
        .modal-body { padding: 25px; overflow-y: auto; }
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; color: var(--gold); font-size: 0.85rem; margin-bottom: 6px; font-family: var(--font-mono); }
        .input-box { width: 100%; padding: 12px; background: #0a0e0a; border: 1px solid var(--olive); color: #fff; font-family: var(--font-mono); font-size: 1rem; outline: none; transition: 0.3s; }
        .input-box:focus { border-color: var(--gold); box-shadow: 0 0 10px rgba(214, 194, 106, 0.2); }
        .btn-row { display: flex; gap: 15px; margin-top: 25px; }
        .btn { flex: 1; padding: 15px; border: none; font-weight: bold; cursor: pointer; font-family: var(--font-head); text-transform: uppercase; font-size: 1.1rem; transition: 0.2s;}
        .btn-primary { background: var(--gold); color: #000; }
        .btn-primary:hover { background: #fff; }
        .btn-primary:disabled { opacity: 0.5; pointer-events: none; }
        .btn-sec { background: transparent; border: 1px solid var(--olive); color: #888; }
        .btn-sec:hover { color: #fff; border-color: #fff; background: rgba(255,255,255,0.05);}
        .email-notice { font-size: 0.75rem; color: #888; margin-bottom: 8px; font-family: var(--font-mono); }
        .email-notice strong { color: #D6C26A; }
        @media(max-width: 600px) { .brand { font-size: 1.8rem; } .proshow-section { padding: 25px 15px; } .proshow-title { font-size: 2rem; } .btn-large { font-size: 1.1rem; padding: 15px; } }
    </style>
</head>
<body>
    <ishya-header></ishya-header>
    <div style="height: 75px;"></div>
    <div class="scanline"></div>
    <canvas id="bg-canvas"></canvas>
    
    <div id="loader-wrapper">
        <h2 class="loading-text">LOADING PORTAL</h2>
        <div class="loader-bar"></div>
    </div>

    <header>
        <div class="brand">ISHYA -26 <span>FACULTY & STAFF TICKETS</span></div>
    </header>

    <div class="container">
        <div class="proshow-section">
            <h2 class="proshow-title">SECURE YOUR PASS</h2>
            <img src="https://image2url.com/r2/default/images/1772971768923-532219fc-d2bf-4227-ab0a-924ba6e57eaf.png" alt="Proshow Banner" class="proshow-banner">
            <button class="btn-large" onclick="openProshowModal()">BUY TICKET NOW</button>
        </div>
    </div>
<!-- CONTACT FOR QUERIES SECTION -->
            <div style="margin-top: 15px; margin-bottom: 10px; padding-bottom: 15px; border-bottom: 1px dashed var(--olive); text-align: center;">
                <p style="color: var(--gold); font-family: var(--font-mono); font-size: 0.95rem; margin-bottom: 15px; letter-spacing: 1px;">FOR QUERIES CONTACT:</p>
                
                <div style="display: flex; justify-content: center; gap: 25px; flex-wrap: wrap; font-family: var(--font-mono); font-size: 1.1rem;">
                    <!-- Contact 1 -->
                    <div>
                        <span style="color: #888; font-size: 0.9rem; text-transform: uppercase;">Akash:</span> 
                        <a href="tel:+916238593559" style="color: #fff; text-decoration: none; font-weight: bold;">+91 62385 93559</a>
                    </div>
                    
                    <!-- Contact 2 -->
                    <div>
                        <span style="color: #888; font-size: 0.9rem; text-transform: uppercase;">Ajin:</span> 
                        <a href="tel:+918078385449" style="color: #fff; text-decoration: none; font-weight: bold;">+91 80783 85449</a>
                    </div>
                    
                    <!-- Contact 3 -->
                    <div>
                        <span style="color: #888; font-size: 0.9rem; text-transform: uppercase;">Ashmith:</span> 
                        <a href="tel:+918477989974" style="color: #fff; text-decoration: none; font-weight: bold;">+91 84779 89974</a>
                    </div>
                </div>
            </div>
            <!-- END OF CONTACT SECTION -->
    <div id="proshow-modal-overlay">
        <div class="proshow-container">
            <div class="modal-header">
                <span class="modal-title" id="psTitle">FACULTY REGISTRATION</span>
                <span class="close-icon" onclick="closeProshowModal()">&times;</span>
            </div>
            <div class="modal-body" id="psContent"></div>
        </div>
    </div>

    <script>
        // 🚨 YOUR API LINK GOES HERE (Fixed Quote!)
        const PROSHOW_API = "https://script.google.com/macros/s/AKfycbzBExtu9CuKN2WIt9nadJCJgASLccg3m7FKfjQndEpnQQlQtTJaRIf6Lqqj0Z5aHWf-/exec";
        
        let TICKET_PRICES = {}; 
        let BATCH_UPI_MAP_PROSHOW = {}, psDetails = {}; 

        window.onload = () => { 
            initCanvas(); 
            fetchProshowData(); 
            setTimeout(() => document.body.classList.add('loaded'), 150);
        };

        async function fetchProshowData() {
            try {
                const res = await fetch(PROSHOW_API);
                const json = await res.json();
                if(json.status === "success") { 
                    if(json.batches) BATCH_UPI_MAP_PROSHOW = json.batches; 
                    if(json.prices) TICKET_PRICES = json.prices;

                    // ⚡ FIX: Force Update UI if user opened modal before data loaded
                    if(document.getElementById('proshow-modal-overlay').style.display === 'flex') {
                        renderPsDetails(); 
                    }
                }
            } catch (e) { 
                console.error("Proshow Fetch Error:", e);
                // Force load to stop infinite loop on error
                document.body.classList.add('loaded');
            }
        }

        function getBatchOptions(selectedValue) {
            let options = `<option value="">-- SELECT FUNDING/BATCH --</option>`;
            if (Object.keys(BATCH_UPI_MAP_PROSHOW).length === 0) {
                options += `<option value="OTHERS">General Fund (Loading...)</option>`;
            } else {
                for (const key in BATCH_UPI_MAP_PROSHOW) { 
                    const sel = (selectedValue === key) ? 'selected' : ''; 
                    options += `<option value="${key}" ${sel}>${key}</option>`; 
                }
            }
            return options;
        }

        function compressImage(file, callback) {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = function(event) {
                const img = new Image();
                img.src = event.target.result;
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    let width = img.width, height = img.height;
                    if (width > height) { if (width > 600) { height *= 600 / width; width = 600; } } 
                    else { if (height > 600) { width *= 600 / height; height = 600; } }
                    canvas.width = width; canvas.height = height; 
                    ctx.drawImage(img, 0, 0, width, height);
                    callback(canvas.toDataURL('image/jpeg', 0.5));
                };
            };
        }

        // ================= UI RENDERING =================
        const psOverlay = document.getElementById('proshow-modal-overlay');
        const psContent = document.getElementById('psContent');
        const psTitle = document.getElementById('psTitle');

        function openProshowModal() { psOverlay.style.display = 'flex'; renderPsDetails(); document.body.style.overflow = 'hidden'; }
        function closeProshowModal() { psOverlay.style.display = 'none'; document.body.style.overflow = 'auto'; }

        function renderPsDetails() {
            psTitle.innerText = "FACULTY REGISTRATION";
            
            // 🚀 DYNAMIC PRICES (Fallback to 500)
            const priceFaculty = TICKET_PRICES["Faculty"] || 500;
            const priceStaff = TICKET_PRICES["Staff"] || 500;

            psContent.innerHTML = `
                <form onsubmit="event.preventDefault(); savePsDetails();">
                    <div class="form-group"><label>FULL NAME</label><input class="input-box" id="pName" required value="${psDetails.name||''}"></div>
                    
                    <div class="form-group">
                        <label>IISER MAIL ID</label>
                        <p class="email-notice"><strong>NOTE:</strong> Please use your official @iisertvm.ac.in email address.</p>
                        <input class="input-box" type="email" id="pEmail" required value="${psDetails.email||''}" placeholder="e.g. name@iisertvm.ac.in">
                    </div>

                    <div class="form-group"><label>PHONE</label><input class="input-box" type="tel" id="pPhone" required value="${psDetails.phone||''}"></div>
                    
                    <div class="form-group" style="border-left: 3px solid var(--gold); padding-left: 10px; margin: 25px 0;">
                        <label style="color:#fff; font-size:1rem;">DESIGNATION</label>
                        <select class="input-box" id="pType" required style="border-color: var(--gold); font-size:1.1rem; padding: 15px; background: #111;">
                            <option value="">-- SELECT CATEGORY --</option>
                            <option value="Faculty">FACULTY (₹${priceFaculty})</option>
                            <option value="Staff">STAFF (₹${priceStaff})</option>
                        </select>
                    </div>
                    <div class="form-group"><label>DEPARTMENT</label><input class="input-box" id="pAffil" required value="${psDetails.affiliation||''}" placeholder="e.g. School of Physics"></div>
                    
                    <div class="form-group"><label>FUNDING ACCOUNT / BATCH</label><select class="input-box" id="pBatch" required>${getBatchOptions(psDetails.batch)}</select></div>
                    
                    <div class="btn-row"><button type="button" class="btn btn-sec" onclick="closeProshowModal()">CANCEL</button><button type="submit" class="btn btn-primary">NEXT: PAYMENT</button></div>
                </form>
            `;
        }

        function savePsDetails() {
            const email = document.getElementById('pEmail').value.trim().toLowerCase();
            const type = document.getElementById('pType').value;
            
            // Faculty Validation: strictly enforce iisertvm email
            if (!email.endsWith("@iisertvm.ac.in")) {
                alert("Please use your official @iisertvm.ac.in email address.");
                return;
            }

            // FIXED: Removed the pRoll reference that caused the NEXT button to break
            psDetails = { 
                name: document.getElementById('pName').value, 
                email: email, 
                phone: document.getElementById('pPhone').value, 
                type: type, 
                batch: document.getElementById('pBatch').value, 
                affiliation: document.getElementById('pAffil').value 
            };
            
            renderPsPayment();
        }

        function copyNumber(num) {
            navigator.clipboard.writeText(num);
            const btn = document.getElementById('copyBtn');
            btn.innerText = "COPIED!";
            btn.style.color = "#4D8F48";
            btn.style.borderColor = "#4D8F48";
            setTimeout(() => { btn.innerText = "COPY"; btn.style.color = "#aaa"; btn.style.borderColor = "#555"; }, 2000);
        }

        function renderPsPayment() {
            psTitle.innerText = "PAYMENT";
            const price = TICKET_PRICES[psDetails.type] || 500;
            let batchInfo = BATCH_UPI_MAP_PROSHOW[psDetails.batch] || { id: "", name: "Unknown Receiver", upi: "", phone: "" };
            const upiLink = `upi://pay?pa=${batchInfo.upi}&pn=${encodeURIComponent(batchInfo.name)}&am=${price}&tn=ProshowTicket`;

            let phoneFallbackHtml = "";
            if (batchInfo.phone) {
                phoneFallbackHtml = `
                    <div style="margin-top:20px; border-top:1px dashed #333; padding-top:20px;">
                        <p style="color:#888; font-size:0.8rem; font-family:var(--font-mono); margin-bottom:10px; text-transform:uppercase;">LINK FAILED? PAY VIA NUMBER:</p>
                        <div style="display:flex; justify-content:center; align-items:center; gap:10px;">
                            <span style="font-size:1.6rem; font-weight:bold; color:#fff; letter-spacing:1px;" id="copyPhoneNum">${batchInfo.phone}</span>
                            <button type="button" onclick="copyNumber('${batchInfo.phone}')" style="background:transparent; border:1px solid #555; color:#aaa; padding:5px 12px; cursor:pointer; font-family:var(--font-mono); font-size:0.8rem; transition:0.2s; border-radius:4px;" id="copyBtn">COPY</button>
                        </div>
                        <p style="color:#555; font-size:0.75rem; margin-top:8px; font-family:var(--font-mono);">(Copy and send manually on GPay/PhonePe)</p>
                    </div>
                `;
            }

            psContent.innerHTML = `
                <div style="text-align:center; background:#0a0e0a; padding: 20px; border: 1px solid var(--olive); margin-bottom: 20px;">
                    <p style="color:#888; margin-bottom: 5px; font-family: var(--font-mono);">${psDetails.type.toUpperCase()}</p>
                    <h2 style="color:var(--gold); font-size: 2.8rem; margin-bottom: 5px;">₹${price}</h2>
                    <p style="font-size:0.85rem; color:#666; font-family: var(--font-mono);">PAY TO: <br><strong style="color:#fff">${batchInfo.name}</strong></p>
                </div>
                <div style="text-align:center">
                    <div id="ps-qr-container" style="background:#fff; padding:10px; display:inline-block; border:4px solid var(--gold); margin-bottom:15px;"></div>
                    <a href="${upiLink}" class="btn btn-primary" style="display:block; text-decoration:none; padding:15px;">OPEN UPI APP TO PAY</a>
                    
                    ${phoneFallbackHtml}
                    
                    <div class="form-group" style="text-align:left; border-top:1px dashed var(--olive); padding-top:20px; margin-top:20px;">
                        <label style="color:var(--gold); font-size: 1rem;">TRANSACTION ID (UPI Ref No.) *</label>
                        <input type="text" id="psTxnId" required class="input-box" style="padding:12px; font-size: 1.1rem; letter-spacing: 1px;" placeholder="e.g. 312345678901">
                    </div>

                    <div class="form-group" style="text-align:left; margin-top: 15px;">
                        <label style="color:var(--gold); font-size: 1rem;">PAYMENT SCREENSHOT *</label>
                        <input type="file" id="psReceiptFile" accept="image/*" class="input-box" style="padding:10px;">
                    </div>
                </div>
                <div class="btn-row">
                    <button class="btn btn-sec" onclick="renderPsDetails()">BACK</button>
                    <button class="btn btn-primary" onclick="submitProshowOrder()" id="btnPsSubmit">VERIFY & GENERATE</button>
                </div>
            `;
            setTimeout(() => new QRCode(document.getElementById("ps-qr-container"), { text: upiLink, width: 180, height: 180 }), 100);
        }

        async function submitProshowOrder() {
            const txnIdInput = document.getElementById('psTxnId').value.trim();
            if(!txnIdInput) return alert("Transaction ID is mandatory.");

            const fileInput = document.getElementById('psReceiptFile');
            if(!fileInput.files[0]) return alert("Screenshot is mandatory.");
            
            const btn = document.getElementById('btnPsSubmit'); 
            btn.innerText = "PROCESSING..."; btn.disabled = true;
            
            compressImage(fileInput.files[0], async (base64Img) => {
                try {
                    const payload = { ...psDetails, transactionId: txnIdInput, receiptImage: base64Img, webAppUrl: PROSHOW_API };
                    await fetch(PROSHOW_API, { method: "POST", body: JSON.stringify(payload), mode: 'no-cors' });
                    
                    psTitle.innerText = "SUCCESS";
                    psContent.innerHTML = `
                        <div style="text-align:center; padding:30px;">
                            <h2 style="color:var(--gold); font-size: 1.8rem; margin-bottom: 10px;">ORDER PLACED SUCCESSFULLY</h2>
                            <p style="color:#fff; font-size:1.1rem; margin: 20px 0; padding:15px; border:1px dashed var(--gold);">
                                Please check your email: <br><b style="color:var(--gold)">${psDetails.email}</b>.
                                <br><br>
                                Your Collection E-Ticket will arrive within 2 minutes. If not do check your spam folder.
                            </p>
                            <button class="btn btn-primary" onclick="window.location.reload()" style="margin-top:20px;">DONE</button>
                        </div>
                    `;
                } catch (e) { 
                    alert("Ticket Generation Failed: Please check your internet connection."); 
                    btn.innerText = "RETRY"; btn.disabled = false; 
                }
            });
        }

        function initCanvas() {
            const canvas = document.getElementById('bg-canvas'); const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            const particles = Array.from({length:50}, () => ({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, s: Math.random()*2, d: Math.random()*0.5 + 0.1 }));
            function animate() { 
                ctx.clearRect(0,0,canvas.width,canvas.height); ctx.fillStyle = '#4D8F48'; 
                particles.forEach(p => { p.y -= p.d; if(p.y < 0) p.y = canvas.height; ctx.beginPath(); ctx.arc(p.x, p.y, p.s, 0, Math.PI*2); ctx.fill(); }); 
                requestAnimationFrame(animate); 
            } animate();
        }
    </script>
    <ishya-footer></ishya-footer>
</body>
</html>
