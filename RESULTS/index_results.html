<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ISHYA Results</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            /* Dark background matching your theme */
            background-color: #0f0f0f;
            background-image: radial-gradient(circle at center, #1a1a1a 0%, #050505 100%);
            color: white;
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            padding: 50px 20px;
            min-height: 100vh;
        }
        
        h1 {
            text-align: center;
            font-family: 'Cinzel', serif;
            font-size: 3.5rem;
            letter-spacing: 4px;
            margin-bottom: 10px;
            color: #ffffff;
        }

        .header-line {
            width: 100px;
            height: 2px;
            background-color: #d4af37; /* Elegant gold accent */
            margin: 0 auto 50px auto;
        }

        .results-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 30px;
            max-width: 400px;
            margin: 0 auto;
        }

        .card-container {
            width: 100%;
            background: linear-gradient(
                to top right,
                #975af4,
                #2f7cf8 40%,
                #78aafa 65%,
                #934cff 100%
            );
            padding: 4px;
            border-radius: 32px;
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease;
        }

        .card-container:hover {
            transform: translateY(-5px);
        }

        .card-content {
            width: 100%;
            height: 100%;
            background-color: rgba(22, 26, 32, 0.92);
            border-radius: 30px;
            color: #838383;
            font-size: 12px;
            padding: 25px 18px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            text-align: center;
        }

        .card-title {
            font-family: 'Cinzel', serif;
            font-weight: 600;
            color: #d4af37;
            font-size: 1.4rem;
            margin-bottom: 8px;
        }

        .card-winner {
            font-size: 1rem;
            margin: 8px 0;
            color: #aaaaaa;
        }

        .card-winner strong {
            color: #ffffff;
            font-weight: 600;
        }

        .loading {
            text-align: center;
            color: #d4af37;
            font-size: 1.2rem;
            font-family: 'Cinzel', serif;
            grid-column: 1 / -1;
        }
    </style>
</head>
<body>
    <ishya-header></ishya-header>
    <canvas id="ashCanvas"></canvas>
    <h1>RESULTS</h1>
    <div class="header-line"></div>

    <div id="results-container" class="results-grid">
        <p class="loading">Loading latest results...</p>
    </div>

    <script src="script.js"></script>
</body>
</html>
